name: Déploiement FTP Infomaniak

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Générer la configuration (config.php depuis les secrets)
        run: |
          cat > site/api/config.php <<PHP
          <?php
          const STRIPE_SECRET_KEY = '${{ secrets.STRIPE_SECRET_KEY }}';
          const COOKIE_SECRET     = '${{ secrets.COOKIE_SECRET }}';
          const SITE_URL          = 'https://sur-le-phil.fr';
          PHP

      - name: Envoyer sur Infomaniak (FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: lklh.ftp.infomaniak.com
          username: lklh_surlephil
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./site/
          server-dir: ./

      # Nettoyage : supprime l'ancien dossier /web/ en doublon laissé par les
      # déploiements précédents (server-dir était "web/"). lftp ignore l'absence
      # du dossier (option -f), l'étape reste donc sans effet une fois nettoyé.
      - name: Supprimer l'ancien dossier /web/ en doublon
        env:
          FTP_USER: lklh_surlephil
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          # Infomaniak = FTPS explicite sur le port 21 (AUTH TLS), pas implicite (990).
          lftp -u "$FTP_USER","$FTP_PASS" lklh.ftp.infomaniak.com <<'LFTP'
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          rm -rf web
          bye
          LFTP
